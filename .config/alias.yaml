## Directory Opus
do: dopus "%CD%\$*"
e: explorer %CD%\$*

## scoop
ss: scoop search
si: scoop install
su: scoop uninstall
sh: scoop home
sst: scoop status
sup: scoop update
sua: scoop update -a -k
scc: scoop cleanup * && scoop cache rm *
sr: gsudo scoop reset
ff-scoop: fzf-scoop-buckets
fcc: scoop-formatjson-checkver $1
sib: scoop-install-file