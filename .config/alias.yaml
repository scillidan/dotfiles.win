e: bash explorer_cd.sh
touch: _touch.cmd

## Directory Opus
do: bash dopus_cd.sh

## scoop
ss: scoop search
si: scoop install
gsi: gsudo scoop install
rsi: scoop-reinstall
su: scoop uninstall
rset: gsudo scoop reset
sh: scoop home
sio: scoop info
sup: scoop update
sua: scoop update -a -k
scc: scoop cleanup * && scoop cache rm *
ff-scoop: fzf-scoop-buckets.cmd
schk: scoop-formatjson-checkver.cmd "$*"
sldd: scoop-ldd.cmd $1

## Tabby
tbon: gsudo servy-cli start --name="Tabby"
