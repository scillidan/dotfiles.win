## Directory Opus
do: dopus "%CD%\$*"
e: explorer %CD%\$*

## scoop
ss: scoop search
si: scoop install
su: scoop uninstall
rsi: scoop-reinstall
rset: gsudo scoop reset
sh: scoop home
sup: scoop update
sua: scoop update -a -k
scc: scoop cleanup * && scoop cache rm *
ff-scoop: fzf-scoop-buckets
schk: scoop-formatjson-checkver $1